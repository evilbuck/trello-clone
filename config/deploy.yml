# Kamal deployment configuration for trello-clone
# Deploy to Hostinger VPS with DigitalOcean Container Registry

service: trello-clone

# Image (DigitalOcean Container Registry)
image: releaseoften/trello-clone

# Deployment targets
servers:
  web:
    - 72.60.126.128

# Reverse proxy configuration with SSL
proxy:
  ssl: true
  hosts:
    - trello.buckleyrobinson.com
  app_port: 3000
  healthcheck:
    path: /api/health
    interval: 3

# Volumes for database and application data
volumes:
  - "/var/lib/trello-clone_data:/data"

# Environment variables
env:
  # Public/Non-secret variables
  clear:
    PORT: 3000
    NODE_ENV: production
    DATABASE_PATH: /data/trello-clone.db
    APP_VERSION: "<%= ENV['APP_VERSION'] %>"
    GIT_SHA: "<%= ENV['GIT_SHA'] %>"

  # Secret variables (fetched from 1Password via .kamal/secrets)
  secret:
    - JWT_SECRET
    - BREVO_API_KEY
    - KAMAL_REGISTRY_PASSWORD
    - KAMAL_REGISTRY_USERNAME

# Build configuration
builder:
  arch: amd64
  args:
    APP_VERSION: "<%= ENV['APP_VERSION'] %>"
    GIT_SHA: "<%= ENV['GIT_SHA'] %>"

# Labels
labels:
  service: trello-clone

# Registry (DigitalOcean Container Registry)
registry:
  server: registry.digitalocean.com
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD
